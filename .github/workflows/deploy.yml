name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            cd /var/www/NextFlow

            echo "📥 Pull latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "🟢 Select Node version..."
            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm install
              nvm use
            fi

            NODE_VERSION="$(node -v | sed 's/^v//')"
            NODE_MAJOR="${NODE_VERSION%%.*}"
            if [ "$NODE_MAJOR" -lt 22 ]; then
              echo "❌ Node >= 22.12 is required (current: v${NODE_VERSION})"
              echo "Install nvm on the VPS, then rerun deploy."
              exit 1
            fi
            echo "Using Node v${NODE_VERSION}"

            echo "📦 Install dependencies..."
            npm ci

            echo "🏗️ Build Nuxt..."
            npm run build

            echo "🚀 Reload PM2 safely..."
            NODE_BIN="$(command -v node)"

            if pm2 describe nextflow > /dev/null; then
              pm2 reload nextflow --update-env
            else
              HOST=0.0.0.0 PORT=3000 pm2 start .output/server/index.mjs \
                --name nextflow \
                --interpreter "$NODE_BIN"
            fi

            pm2 save

            echo "✅ Deploy completed successfully"