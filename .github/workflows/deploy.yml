name: Deploy NextFlow

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            set -e

            cd /var/www/NextFlow

            echo "Pull latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "Install dependencies..."
            npm ci --omit=dev

            echo "Build app..."
            npm run build

            echo "Restart PM2..."
            pm2 reload nextflow || pm2 start .output/server/index.mjs --name nextflow

            pm2 save