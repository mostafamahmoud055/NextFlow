name: Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            cd /var/www/NextFlow

            git fetch origin main
            git reset --hard origin/main

            npm ci

            npm run build

            if pm2 describe nextflow > /dev/null; then
              pm2 restart nextflow --update-env
            else
              HOST=0.0.0.0 PORT=3000 pm2 start .output/server/index.mjs \
                --name nextflow \
                --interpreter node
            fi

            pm2 save
